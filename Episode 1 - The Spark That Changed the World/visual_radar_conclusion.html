<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Act 10 — Conclusion: The Global Shield</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #050510;
            --accent: #60d0ff;
            --accent-glow: rgba(96, 208, 255, 0.3);
            --sub: #8899aa;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .step-indicator {
            position: absolute;
            top: 40px;
            left: 40px;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            border-left: 2px solid var(--accent);
            padding-left: 15px;
        }

        .overlay-text {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            max-width: 800px;
            pointer-events: none;
            opacity: 1;
            transition: 1s;
        }

        .overlay-text h2 {
            font-family: 'Orbitron';
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .overlay-text p {
            font-size: 0.9rem;
            color: var(--sub);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <canvas id="main"></canvas>
    <div class="step-indicator" id="step-label">BEAT 1 / 3 — THE LEGACY</div>

    <div class="overlay-text" id="overlay">
        <h2 id="overlay-title">THE LEGACY OF OPANA</h2>
        <p id="overlay-desc">Pearl Harbor proved that seeing is not enough. The future would require the end of
            information silos and the birth of integrated, global defense.</p>
    </div>

    <script>
        const mc = document.getElementById('main');
        const mx = mc.getContext('2d');
        let W, H, t = 0;
        let step = 0;
        let stepStartT = 0;

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            W = window.innerWidth;
            H = window.innerHeight;
            mc.width = W * dpr;
            mc.height = H * dpr;
            mc.style.width = W + 'px';
            mc.style.height = H + 'px';
            mx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        function setStep(s) {
            step = s;
            stepStartT = t;
            const labels = ['THE LEGACY', 'MODERNITY', 'FINAL SUMMARY'];
            const titles = [
                'THE LEGACY OF OPANA',
                'PHASED ARRAY & BEYOND',
                'EPILOGUE: THE SHIELD'
            ];
            const descs = [
                'Pearl Harbor proved that seeing is not enough. The future required the end of information silos.',
                'From mechanical bedsprings to digital AESA arrays, radar became the invisible eye of the planet.',
                'The information silo collapsed. Today, every detection is a global event, shared in milliseconds.'
            ];

            document.getElementById('step-label').innerText = `BEAT ${s + 1} / 3 — ${labels[s]}`;
            document.getElementById('overlay-title').innerText = titles[s];
            document.getElementById('overlay-desc').innerText = descs[s];
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') setStep((step + 1) % 3);
            if (e.key === 'ArrowLeft') setStep((step + 2) % 3);
        });

        function loop() {
            mx.clearRect(0, 0, W, H);

            if (step === 0) drawLegacy();
            else if (step === 1) drawModernity();
            else if (step === 2) drawFinalSummary();

            t += 0.016;
            requestAnimationFrame(loop);
        }

        // --- BEAT 1: THE LEGACY (World Dots) ---
        const mapDots = [];
        for (let i = 0; i < 150; i++) {
            mapDots.push({
                x: Math.random() * 0.8 + 0.1,
                y: Math.random() * 0.6 + 0.2,
                size: Math.random() * 2 + 1,
                delay: Math.random() * 2
            });
        }

        function drawLegacy() {
            const dt = t - stepStartT;
            const cx = W / 2, cy = H / 2;

            // Faint Grid
            mx.strokeStyle = 'rgba(96, 208, 255, 0.05)';
            mx.lineWidth = 1;
            for (let x = 0; x < W; x += 50) { mx.beginPath(); mx.moveTo(x, 0); mx.lineTo(x, H); mx.stroke(); }
            for (let y = 0; y < H; y += 50) { mx.beginPath(); mx.moveTo(0, y); mx.lineTo(W, y); mx.stroke(); }

            // Ghostly World Map (Abstract)
            mx.fillStyle = 'rgba(255,255,255,0.03)';
            mx.beginPath();
            mx.ellipse(cx, cy, W * 0.4, H * 0.3, 0, 0, Math.PI * 2);
            mx.fill();

            // Radar Sites Lighting Up
            mapDots.forEach(d => {
                const progress = Math.max(0, Math.min(1, (dt - d.delay) / 1));
                if (progress > 0) {
                    const alpha = progress * (0.5 + 0.5 * Math.sin(t * 5 + d.delay * 10));
                    mx.fillStyle = `rgba(96, 208, 255, ${alpha})`;
                    mx.beginPath();
                    mx.arc(d.x * W, d.y * H, d.size, 0, Math.PI * 2);
                    mx.fill();

                    if (progress < 1) {
                        mx.strokeStyle = `rgba(96, 208, 255, ${1 - progress})`;
                        mx.beginPath();
                        mx.arc(d.x * W, d.y * H, d.size + (progress * 20), 0, Math.PI * 2);
                        mx.stroke();
                    }
                }
            });
        }

        // --- BEAT 2: MODERNITY (Phased Array) ---
        function drawModernity() {
            const dt = t - stepStartT;
            const cx = W / 2, cy = H / 2;

            // ISOMETRIC PLATE BACKGROUND (LIFTED)
            mx.save();
            mx.translate(cx, cy);
            mx.rotate(-0.2);
            mx.fillStyle = '#15152a'; // Lifted from black
            mx.fillRect(-200, -200, 400, 400);
            mx.strokeStyle = 'rgba(96, 208, 255, 0.4)'; mx.lineWidth = 2;
            mx.strokeRect(-201, -201, 402, 402); // Rim for the whole plate
            mx.restore();

            // Phased Array Elements
            mx.save();
            mx.translate(cx, cy);
            mx.rotate(-0.2);

            const rows = 12, cols = 12;
            const gap = 30;
            const startX = -(cols * gap) / 2;
            const startY = -(rows * gap) / 2;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const px = startX + c * gap;
                    const py = startY + r * gap;

                    // Element Active Glow
                    const wave = Math.sin(t * 2 - (r + c) * 0.5);
                    const alpha = 0.1 + 0.3 * (wave > 0.8 ? 1 : 0);

                    mx.fillStyle = `rgba(96, 208, 255, ${alpha})`;
                    mx.fillRect(px, py, 15, 15);

                    if (wave > 0.9) {
                        mx.strokeStyle = `rgba(96, 208, 255, ${alpha * 2})`;
                        mx.strokeRect(px - 2, py - 2, 19, 19);
                    }
                }
            }

            // Beams emerging from array
            mx.globalAlpha = 0.1;
            const beamGrad = mx.createLinearGradient(0, 0, 0, -300);
            beamGrad.addColorStop(0, 'rgba(96, 208, 255, 0.8)');
            beamGrad.addColorStop(1, 'rgba(96, 208, 255, 0)');
            mx.fillStyle = beamGrad;

            const beamX = Math.sin(t) * 100;
            mx.beginPath();
            mx.moveTo(-50, 0); mx.lineTo(50, 0);
            mx.lineTo(beamX + 20, -300); mx.lineTo(beamX - 20, -300);
            mx.closePath(); mx.fill();

            mx.restore();
        }

        // --- BEAT 3: FINAL SUMMARY (Text Crawl) ---
        function drawFinalSummary() {
            const dt = t - stepStartT;
            const cx = W / 2, cy = H / 2;

            const lines = [
                "RADAR: THE INVISIBLE REVOLUTION",
                "From Maxwell's equations to Opana's CLIFFS,",
                "the story of radar is the story of",
                "humanity learning to see the unseen.",
                "",
                "The silos are gone.",
                "The eyes are everywhere.",
                "",
                "PROJECT ANTIGRAVITY // 2026"
            ];

            mx.font = '700 24px Orbitron';
            mx.textAlign = 'center';
            mx.textBaseline = 'middle';

            const startY = H - (dt * 50); // Scrolling up

            lines.forEach((line, i) => {
                const y = startY + (i * 40);
                if (y > 100 && y < H - 150) {
                    const alpha = Math.min(1, Math.max(0, 1 - Math.abs(cy - y) / (H / 2)));
                    mx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    mx.fillText(line, cx, y);
                }
            });

            // Final Logo Glow
            if (dt > 8) {
                const logoAlpha = Math.min(1, (dt - 8) / 2);
                mx.globalAlpha = logoAlpha;
                mx.fillStyle = '#60d0ff';
                mx.font = '900 48px Orbitron';
                mx.fillText('RADAR', cx, cy - 20);
                mx.font = '400 12px Orbitron';
                mx.fillText('THE HISTORY OF SEEING THE UNSEEN', cx, cy + 30);
                mx.globalAlpha = 1;
            }
        }

        resize();
        loop();
    </script>
</body>

</html>
